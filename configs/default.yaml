# Default experiment / smoke-test settings (override via CLI or another YAML).

# Week 1 default: gen9bssfactory = Showdown "Randomized 3v3 Singles" (BSS Factory).
# Long-horizon proxy (six sequential): gen9randombattle. Stricter 6v6 factory pilot: gen9battlefactory.
battle_format: gen9bssfactory
n_battles: 1
max_concurrent_battles: 1

# Local Showdown: start with `node pokemon-showdown start --no-security` (default poke-env URL).
